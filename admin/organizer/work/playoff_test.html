<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LazaCup — Playoff Lab</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3/dist/css/uikit.min.css">
  <link rel="stylesheet" href="/admin/_admin.css?v=4">

  <script src="https://cdn.jsdelivr.net/npm/uikit@3/dist/js/uikit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/uikit@3/dist/js/uikit-icons.min.js"></script>

  <script src="/admin/_admin.js?v=4" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Admin.initAdminHeader('organizer');
    });
  </script>

  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .small { font-size: 12px; }
  </style>
</head>
<body>
  <div id="adminHeader"></div>

  <div class="uk-container uk-margin">
    <h3 class="uk-margin-small-bottom">Playoff Lab (песочница)</h3>
    <div class="uk-text-meta uk-margin-small-bottom">
      Здесь только схема (A1/B2/W:SF1), без команд/счёта/полей. Ничего в БД не пишется.
    </div>

    <div class="uk-grid-small uk-child-width-1-3@m" uk-grid>
      <div>
        <label class="uk-form-label">Кол-во групп</label>
        <select id="groupsCount" class="uk-select">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
        </select>
      </div>

      <div>
        <label class="uk-form-label">Команд в группе (для схемы)</label>
        <input id="teamsPerGroup" class="uk-input" type="number" min="2" value="4">
      </div>

      <div>
        <label class="uk-form-label">Режим</label>
        <select id="mode" class="uk-select"></select>
      </div>
    </div>

    <div class="uk-margin">
      <button id="btnBuild" class="uk-button uk-button-primary">Построить схему</button>
      <button id="btnCopy" class="uk-button uk-button-default">Копировать JSON</button>
    </div>

    <div class="uk-overflow-auto">
      <table class="uk-table uk-table-small uk-table-divider">
        <thead>
          <tr>
            <th class="uk-table-shrink">code</th>
            <th>home</th>
            <th>away</th>
            <th class="uk-table-shrink">round</th>
          </tr>
        </thead>
        <tbody id="outBody"></tbody>
      </table>
    </div>

    <pre id="outJson" class="uk-padding-small uk-background-muted mono small" style="border-radius:8px; white-space:pre-wrap;"></pre>
  </div>

<script>
(function(){
  const el = (id) => document.getElementById(id);

  const MODE_OPTIONS = {
    1: [
      {v:'blocks4_all_places_1g', t:'Блоки по 4 (все места)'},
      {v:'top4_semis_finals', t:'Топ-4 (полуфиналы+финалы)'},
      {v:'golden_matches_1g', t:'Золотые матчи (лестница мест)'}
    ],
    2: [
      {v:'ties_all_places_2g', t:'Стыки за места (A1-B1, A2-B2, ...)'},
      {v:'blocks4_all_places_2g', t:'Полуфиналы по блокам мест (1–4, 5–8, ...)'}
    ],
    3: [
      {v:'blocks4_all_places_3g', t:'3 группы: победители + лучший 2-й в топ-4, остальные блоками'}
    ]
  };

  function fillModes() {
    const gc = parseInt(el('groupsCount').value, 10);
    const modeSel = el('mode');
    modeSel.innerHTML = '';
    (MODE_OPTIONS[gc] || []).forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.v;
      opt.textContent = o.t;
      modeSel.appendChild(opt);
    });
  }

  function code(block, part){ return `P${block}_${part}`; }

  function pushMatch(arr, code, home, away, round){
    arr.push({code, home_ref: home, away_ref: away, round});
  }

  function build(gc, tpg, mode) {
    const A='A', B='B', C='C';
    const m = [];

    if (mode === 'ties_all_places_2g') {
      for (let i=1; i<=tpg; i++) pushMatch(m, `T${i}`, `GE:${A}:${i}`, `GE:${B}:${i}`, 'TIES');
      return m;
    }

    if (mode === 'blocks4_all_places_2g') {
      const blocks = Math.ceil(tpg / 2); // each block uses 2 places from each group
      for (let b=1; b<=blocks; b++) {
        const p1 = (b-1)*2 + 1;
        const p2 = (b-1)*2 + 2;
        if (p1 > tpg) break;

        // SF
        pushMatch(m, code(b,'SF1'), `GE:${A}:${p1}`, `GE:${B}:${Math.min(p2,tpg)}`, `B${b} SF`);
        pushMatch(m, code(b,'SF2'), `GE:${B}:${p1}`, `GE:${A}:${Math.min(p2,tpg)}`, `B${b} SF`);

        // Finals inside block
        pushMatch(m, code(b,'F12'), `W:${code(b,'SF1')}`, `W:${code(b,'SF2')}`, `B${b} 1/2`);
        pushMatch(m, code(b,'F34'), `L:${code(b,'SF1')}`, `L:${code(b,'SF2')}`, `B${b} 3/4`);
      }
      return m;
    }



if (mode === 'golden_matches_1g') {
  // 1 группа: "золотые матчи" — 1-2, 3-4, затем 5 vs проигравший 3-4 и далее по аналогии.
  // Пары только refs, без команд/счёта. Для малых tpg деградируем аккуратно.
  const grp = A;

  if (tpg >= 2) {
    pushMatch(m, 'GOLD_12', `GE:${grp}:1`, `GE:${grp}:2`, 'за 1/2');
  }
  if (tpg === 3) {
    pushMatch(m, 'GOLD_23', `GE:${grp}:3`, `L:GOLD_12`, 'за 2 место');
    return m;
  }
  if (tpg >= 4) {
    pushMatch(m, 'GOLD_34', `GE:${grp}:3`, `GE:${grp}:4`, 'за 3 место');
    let prev = 'GOLD_34';
    for (let p=5; p<=tpg; p++) {
      const c = `GOLD_${p-1}${p}`;
      pushMatch(m, c, `GE:${grp}:${p}`, `L:${prev}`, `за ${p-1} место`);
      prev = c;
    }
  }
  return m;
}

    if (mode === 'blocks4_all_places_1g') {
      const blocks = Math.ceil(tpg / 4);
      for (let b=1; b<=blocks; b++) {
        const base = (b-1)*4;
        const p1 = base+1, p2=base+2, p3=base+3, p4=base+4;
        if (p1 > tpg) break;
        pushMatch(m, code(b,'SF1'), `GE:${A}:${p1}`, `GE:${A}:${Math.min(p4,tpg)}`, `B${b} SF`);
        pushMatch(m, code(b,'SF2'), `GE:${A}:${Math.min(p2,tpg)}`, `GE:${A}:${Math.min(p3,tpg)}`, `B${b} SF`);
        pushMatch(m, code(b,'F12'), `W:${code(b,'SF1')}`, `W:${code(b,'SF2')}`, `B${b} 1/2`);
        pushMatch(m, code(b,'F34'), `L:${code(b,'SF1')}`, `L:${code(b,'SF2')}`, `B${b} 3/4`);
      }
      return m;
    }

    if (mode === 'top4_semis_finals') {
      // generic: overall seeds (no group binding)
      pushMatch(m, 'TOP_SF1', 'R:1', 'R:4', 'SF');
      pushMatch(m, 'TOP_SF2', 'R:2', 'R:3', 'SF');
      pushMatch(m, 'TOP_F12', 'W:TOP_SF1', 'W:TOP_SF2', '1/2');
      pushMatch(m, 'TOP_F34', 'L:TOP_SF1', 'L:TOP_SF2', '3/4');
      return m;
    }

    if (mode === 'blocks4_all_places_3g') {
      // Block 1: winners + best 2nd
      pushMatch(m, code(1,'SF1'), `GE:${A}:1`, `BEST:2`, 'Top4 SF');
      pushMatch(m, code(1,'SF2'), `GE:${B}:1`, `GE:${C}:1`, 'Top4 SF');
      pushMatch(m, code(1,'F12'), `W:${code(1,'SF1')}`, `W:${code(1,'SF2')}`, 'Top4 1/2');
      pushMatch(m, code(1,'F34'), `L:${code(1,'SF1')}`, `L:${code(1,'SF2')}`, 'Top4 3/4');

      // The rest: show as blocks by overall ranking placeholders
      pushMatch(m, code(2,'SF1'), 'R:5', 'R:8', '5–8 SF');
      pushMatch(m, code(2,'SF2'), 'R:6', 'R:7', '5–8 SF');
      pushMatch(m, code(2,'F12'), `W:${code(2,'SF1')}`, `W:${code(2,'SF2')}`, '5/6');
      pushMatch(m, code(2,'F34'), `L:${code(2,'SF1')}`, `L:${code(2,'SF2')}`, '7/8');

      return m;
    }

    return m;
  }

  function render(list) {
    const body = el('outBody');
    body.innerHTML = '';
    list.forEach(x => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="mono">${x.code}</td>
        <td class="mono">${x.home_ref}</td>
        <td class="mono">${x.away_ref}</td>
        <td class="mono uk-text-muted">${x.round}</td>
      `;
      body.appendChild(tr);
    });
    el('outJson').textContent = JSON.stringify(list, null, 2);
  }

  el('groupsCount').addEventListener('change', () => { fillModes(); render([]); el('outJson').textContent=''; });
  fillModes();

  el('btnBuild').addEventListener('click', () => {
    const gc = parseInt(el('groupsCount').value, 10);
    const tpg = Math.max(2, parseInt(el('teamsPerGroup').value, 10) || 4);
    const mode = el('mode').value;
    render(build(gc, tpg, mode));
    UIkit.notification({message:'Схема построена', status:'primary'});
  });

  el('btnCopy').addEventListener('click', async () => {
    const txt = el('outJson').textContent || '';
    try {
      await navigator.clipboard.writeText(txt);
      UIkit.notification({message:'JSON скопирован', status:'success'});
    } catch (e) {
      UIkit.notification({message:'Не удалось скопировать', status:'danger'});
    }
  });
})();
</script>
</body>
</html>
